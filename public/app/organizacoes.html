<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Organizações · Estímulo</title>
    <link rel="icon" href="assets/img/logo-mark.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="assets/img/logo-mark.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
      .org-item { border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--surface); overflow: hidden; }
      .org-item-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px; cursor:pointer; }
      .org-item-head:hover { background: var(--surface-strong); }
      .org-item-body { display:none; border-top:1px solid var(--line); }
      .org-item.open .org-item-body { display:block; }
      .org-item.open .chev { transform: rotate(90deg); }
      .chev { transition: transform 0.15s ease; color: var(--text-faint); }
      .org-meta { display:flex; gap:6px; align-items:center; }
      .org-info-label { font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-faint); margin-bottom:4px; }
      .org-info-label:not(:first-child) { margin-top:12px; }
      .kebab-btn { border:0; background:transparent; cursor:pointer; padding:4px 10px; border-radius:6px; color:var(--text-muted); font-size:18px; line-height:1; letter-spacing:2px; }
      .kebab-btn:hover { background:var(--surface-strong); }
      .status-line { min-height:20px; margin-top:10px; font-size:12.5px; color:var(--text-muted); }
      .status-line.error { color:var(--danger); }
    </style>
  </head>
  <body data-page="organizacoes">
    <div class="shell">
      <aside class="sidebar" id="sidebar-root"></aside>

      <div class="main">
        <header class="topbar">
          <div class="topbar-titles">
            <h1>Organizações</h1>
            <p>Consulte as organizações cadastradas e os grupos dentro de cada uma.</p>
          </div>
          <div class="topbar-actions">
            <div class="user-chip"><span class="avatar">GL</span> Gustavo Luz</div>
          </div>
        </header>

        <main class="page">
          <section class="page-section">
            <div class="toolbar">
              <div class="field" style="min-width:260px;">
                <label for="orgSearch">Pesquisar organização</label>
                <input id="orgSearch" type="search" placeholder="Ex.: Zona Leste">
              </div>
              <div class="toolbar-spacer"></div>
              <button class="btn" id="newOrgButton" type="button">Nova organização</button>
            </div>
          </section>

          <section class="page-section" id="orgList"></section>
        </main>
      </div>
    </div>

    <div class="overlay" id="orgOverlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h3 id="orgModalTitle">Nova organização</h3>
          <button class="icon-btn-close" id="closeOrgModal" type="button" aria-label="Fechar">&times;</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="orgNome">Nome</label>
            <input id="orgNome" type="text" placeholder="Ex.: Associação Comercial Zona Leste">
          </div>
          <div class="field">
            <label for="orgPrograma">Programa</label>
            <input id="orgPrograma" type="text" placeholder="Ex.: Mulheres Empreendedoras">
          </div>
          <div class="field">
            <label for="orgDescricao">Descrição</label>
            <textarea id="orgDescricao" rows="3" placeholder="Breve descrição da organização"></textarea>
          </div>
          <div id="orgModalStatus" class="status-line"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelOrgModal" type="button">Cancelar</button>
          <button class="btn" id="saveOrgModal" type="button">Salvar</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="orgInfoOverlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h3 id="orgInfoTitle">Organização</h3>
          <button class="icon-btn-close" id="closeOrgInfoModal" type="button" aria-label="Fechar">&times;</button>
        </div>
        <div class="modal-body">
          <div class="org-info-label">Programa</div>
          <div id="orgInfoPrograma"></div>
          <div class="org-info-label" style="margin-top:14px;">Descrição</div>
          <div id="orgInfoDescricao"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelOrgInfoModal" type="button">Fechar</button>
          <button class="btn" id="editFromOrgInfoModal" type="button">Editar organização</button>
        </div>
      </div>
    </div>

    <script src="assets/js/nav.js"></script>
    <script>
      const state = {
        organizations: [],
        groups: [],
      };
      let editingOrgId = null;
      let infoOrgId = null;

      function escapeHtml(value) {
        return String(value === null || value === undefined ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function requestJson(url, options) {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || `Falha na requisicao (${response.status})`);
        }

        return payload;
      }

      function groupsForOrg(orgId) {
        return state.groups.filter((g) => g.organization_id === orgId);
      }

      function render() {
        const q = document.getElementById("orgSearch").value.trim().toLowerCase();
        const orgs = state.organizations.filter((o) => String(o.nome || "").toLowerCase().includes(q));

        if (!orgs.length) {
          document.getElementById("orgList").innerHTML = '<div class="empty-state"><strong>Nenhuma organização encontrada</strong></div>';
          return;
        }

        document.getElementById("orgList").innerHTML = orgs
          .map((org, index) => {
            const groups = groupsForOrg(org.id);

            return `
              <div class="org-item${index === 0 ? " open" : ""}" data-org="${escapeHtml(org.id)}">
                <div class="org-item-head" data-toggle="${escapeHtml(org.id)}">
                  <div>
                    <strong>${escapeHtml(org.nome)}</strong>
                    <div class="text-faint" style="font-size:12.5px;margin-top:2px;">${groups.length} grupo(s) sincronizado(s)</div>
                  </div>
                  <div class="org-meta">
                    <button class="kebab-btn" data-info-toggle="${escapeHtml(org.id)}" type="button" aria-label="Mais opções">&#8942;</button>
                    <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
                  </div>
                </div>
                <div class="org-item-body">
                  ${
                    groups.length
                      ? `<div class="table-wrap" style="border:0;border-radius:0;">
                          <table>
                            <thead><tr><th>Grupo</th><th>Perfil</th><th>Envia vídeo</th><th>Trilha</th></tr></thead>
                            <tbody>
                              ${groups
                                .map(
                                  (g) => `
                                <tr>
                                  <td class="strong">${escapeHtml(g.nome)}</td>
                                  <td>${g.segmento ? escapeHtml(g.segmento) : '<span class="text-faint">—</span>'}</td>
                                  <td>${g.envia_video === true ? '<span class="badge badge-info">Habilitado</span>' : '<span class="badge badge-danger">Não envia</span>'}</td>
                                  <td>${g.trilha_override ? escapeHtml(g.trilha_override) : '<span class="text-faint">Sem trilha</span>'}</td>
                                </tr>`
                                )
                                .join("")}
                            </tbody>
                          </table>
                        </div>`
                      : '<div class="empty-state">Nenhum grupo sincronizado para esta organização ainda.</div>'
                  }
                  <div style="padding:12px 20px;text-align:right;"><a class="btn btn-ghost btn-sm" href="grupos.html">Gerenciar grupos →</a></div>
                </div>
              </div>`;
          })
          .join("");

        document.querySelectorAll("[data-toggle]").forEach((head) => {
          head.addEventListener("click", () => {
            const item = head.closest(".org-item");
            const wasOpen = item.classList.contains("open");

            document.querySelectorAll(".org-item.open").forEach((openItem) => {
              openItem.classList.remove("open");
            });

            if (!wasOpen) {
              item.classList.add("open");
            }
          });
        });

        document.querySelectorAll("[data-info-toggle]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            openOrgInfoModal(button.dataset.infoToggle);
          });
        });
      }

      function openOrgInfoModal(orgId) {
        const org = state.organizations.find((item) => item.id === orgId);
        if (!org) return;

        infoOrgId = org.id;
        document.getElementById("orgInfoTitle").textContent = org.nome;
        document.getElementById("orgInfoPrograma").innerHTML = org.programa
          ? escapeHtml(org.programa)
          : '<span class="text-faint">Não informado</span>';
        document.getElementById("orgInfoDescricao").innerHTML = org.descricao
          ? escapeHtml(org.descricao)
          : '<span class="text-faint">Não informado</span>';
        document.getElementById("orgInfoOverlay").hidden = false;
      }

      function closeOrgInfoModal() {
        document.getElementById("orgInfoOverlay").hidden = true;
        infoOrgId = null;
      }

      function openOrgModal(orgId) {
        const org = orgId ? state.organizations.find((item) => item.id === orgId) : null;
        editingOrgId = org ? org.id : null;

        document.getElementById("orgModalTitle").textContent = org ? `Editar - ${org.nome}` : "Nova organização";
        document.getElementById("orgNome").value = org ? org.nome || "" : "";
        document.getElementById("orgPrograma").value = org ? org.programa || "" : "";
        document.getElementById("orgDescricao").value = org ? org.descricao || "" : "";
        document.getElementById("orgModalStatus").textContent = "";
        document.getElementById("orgModalStatus").className = "status-line";
        document.getElementById("orgOverlay").hidden = false;
      }

      function closeOrgModal() {
        document.getElementById("orgOverlay").hidden = true;
        editingOrgId = null;
      }

      async function saveOrgModal() {
        const saveButton = document.getElementById("saveOrgModal");
        const status = document.getElementById("orgModalStatus");
        const payload = {
          nome: document.getElementById("orgNome").value.trim(),
          programa: document.getElementById("orgPrograma").value.trim() || null,
          descricao: document.getElementById("orgDescricao").value.trim() || null,
        };

        if (!payload.nome) {
          status.textContent = "Informe o nome da organização.";
          status.className = "status-line error";
          return;
        }

        saveButton.disabled = true;
        status.textContent = "Salvando organização...";
        status.className = "status-line";

        try {
          const organization = editingOrgId
            ? await requestJson(`/organizations/${encodeURIComponent(editingOrgId)}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              })
            : await requestJson("/organizations", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });

          const index = state.organizations.findIndex((item) => item.id === organization.id);
          if (index >= 0) {
            state.organizations[index] = organization;
          } else {
            state.organizations.unshift(organization);
          }

          closeOrgModal();
          render();
        } catch (error) {
          status.textContent = error.message;
          status.className = "status-line error";
        } finally {
          saveButton.disabled = false;
        }
      }

      function renderLoadError(error) {
        document.getElementById("orgList").innerHTML = `
          <div class="empty-state"><strong>Falha ao carregar organizações</strong><span>${escapeHtml(error.message)}</span></div>`;
      }

      async function initialize() {
        document.getElementById("orgList").innerHTML = `
          <div class="empty-state"><strong>Carregando organizações</strong><span>Buscando dados reais no Supabase.</span></div>`;

        try {
          const [organizations, groups] = await Promise.all([
            requestJson("/organizations"),
            requestJson("/groups/search"),
          ]);

          state.organizations = Array.isArray(organizations) ? organizations : [];
          state.groups = Array.isArray(groups) ? groups : [];
          render();
        } catch (error) {
          renderLoadError(error);
        }
      }

      document.getElementById("orgSearch").addEventListener("input", render);
      document.getElementById("newOrgButton").addEventListener("click", () => openOrgModal(null));
      document.getElementById("closeOrgModal").addEventListener("click", closeOrgModal);
      document.getElementById("cancelOrgModal").addEventListener("click", closeOrgModal);
      document.getElementById("orgOverlay").addEventListener("click", (event) => {
        if (event.target.id === "orgOverlay") closeOrgModal();
      });
      document.getElementById("saveOrgModal").addEventListener("click", saveOrgModal);

      document.getElementById("closeOrgInfoModal").addEventListener("click", closeOrgInfoModal);
      document.getElementById("cancelOrgInfoModal").addEventListener("click", closeOrgInfoModal);
      document.getElementById("orgInfoOverlay").addEventListener("click", (event) => {
        if (event.target.id === "orgInfoOverlay") closeOrgInfoModal();
      });
      document.getElementById("editFromOrgInfoModal").addEventListener("click", () => {
        const orgId = infoOrgId;
        closeOrgInfoModal();
        openOrgModal(orgId);
      });

      initialize();
    </script>
  </body>
</html>
