<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trilhas de conteúdo · Estímulo</title>
    <link rel="icon" href="assets/img/logo-mark.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="assets/img/logo-mark.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
      .trail-card { cursor: pointer; transition: box-shadow 0.15s ease, border-color 0.15s ease; }
      .trail-card:hover { box-shadow: var(--shadow-md); }
      .trail-card.selected { border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(78,121,255,0.15); }
      .settings-row { display:flex; align-items:center; gap:12px; }
      .macrotema-path { font-size:12px; color: var(--text-faint); margin-bottom:14px; }
      .trilha-tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
      .trilha-tab { border:1px solid var(--line); background:var(--surface); border-radius:999px; padding:7px 14px; font-size:12.5px; font-weight:600; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; gap:6px; }
      .trilha-tab:hover { background: var(--surface-strong); }
      .trilha-tab.active { background: var(--brand-blue); border-color: var(--brand-blue); color:#fff; }
      .trilha-tab .count { font-weight:400; opacity:0.85; }
      tr.video-row { cursor: grab; }
      tr.video-row.dragging { opacity: 0.4; }
      tr.video-row.drag-over { box-shadow: inset 0 2px 0 var(--brand-blue); }
      .drag-handle { cursor: grab; color: var(--text-faint); padding-right: 6px; }
      .unclassified-list { max-height: 220px; overflow-y: auto; border:1px solid var(--line); border-radius: var(--radius-md); }
      .unclassified-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line); font-size:12.5px; }
      .unclassified-item:last-child { border-bottom: 0; }
    </style>
  </head>
  <body data-page="trilhas">
    <div class="shell">
      <aside class="sidebar" id="sidebar-root"></aside>

      <div class="main">
        <header class="topbar">
          <div class="topbar-titles">
            <h1>Trilhas de conteúdo</h1>
            <p>Catálogo de vídeos por perfil de jornada, macrotema e trilha.</p>
          </div>
          <div class="topbar-actions">
            <button class="btn" id="newTrailButton" type="button">+ Nova trilha</button>
            <div class="user-chip"><span class="avatar">GL</span> Gustavo Luz</div>
          </div>
        </header>

        <main class="page">
          <section class="page-section">
            <div class="section-head">
              <h2>Macrotemas por perfil de jornada</h2>
              <div class="segmented" id="perfilTabs">
                <button class="active" data-perfil="todos">Todos</button>
              </div>
            </div>
            <div class="grid grid-cols-3" id="macrotemaGrid"></div>
          </section>

          <section class="page-section" id="trailDetailSection" style="display:none;">
            <div class="section-head">
              <h2 id="macrotemaDetailTitle">Trilhas do macrotema</h2>
              <span class="text-faint" id="trailDetailMeta"></span>
            </div>

            <div class="trilha-tabs" id="trilhaTabs"></div>
            <p class="macrotema-path" id="macrotemaPath"></p>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Ordem</th>
                    <th>Arquivo</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="videosBody"></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

    <div class="overlay" id="newTrailOverlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h3>Nova trilha</h3>
          <button class="icon-btn-close" data-close-new type="button" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="newTrailPerfil">Perfil da jornada</label>
            <select id="newTrailPerfil"></select>
          </div>
          <div class="field">
            <label for="newTrailMacrotema">Macrotema</label>
            <select id="newTrailMacrotema"></select>
          </div>
          <div class="field" id="newTrailMacrotemaNovoField" style="display:none;">
            <label for="newTrailMacrotemaNovo">Nome do novo macrotema</label>
            <input id="newTrailMacrotemaNovo" type="text" placeholder="Ex.: GESTÃO FINANCEIRA: Dinheiro Organizado">
          </div>
          <div class="field">
            <label for="newTrailNome">Nome da trilha</label>
            <input id="newTrailNome" type="text" placeholder="Ex.: 2.3 Como Cuidar das Finanças">
          </div>
          <div class="field">
            <label>Vídeos novos do Drive sem trilha definida</label>
            <div class="unclassified-list" id="newTrailVideosList"></div>
          </div>
          <div id="newTrailStatus" class="status-line"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-close-new type="button">Cancelar</button>
          <button class="btn" id="createTrailButton" type="button">Cadastrar trilha</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="moveOverlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h3>Mover vídeo de trilha</h3>
          <button class="icon-btn-close" data-close-move type="button" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">
          <p id="moveVideoLabel" class="text-muted"></p>
          <div class="field">
            <label for="moveTargetPerfil">Perfil da jornada</label>
            <select id="moveTargetPerfil"></select>
          </div>
          <div class="field">
            <label for="moveTargetMacrotema">Macrotema</label>
            <select id="moveTargetMacrotema"></select>
          </div>
          <div class="field">
            <label for="moveTargetTrilha">Trilha</label>
            <select id="moveTargetTrilha"></select>
          </div>
          <div id="moveStatus" class="status-line"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-close-move type="button">Cancelar</button>
          <button class="btn" id="confirmMoveButton" type="button">Mover vídeo</button>
        </div>
      </div>
    </div>

    <script src="assets/js/nav.js"></script>
    <script>
      const state = {
        trails: [],
        unclassified: [],
      };
      const NEW_MACROTEMA_OPTION = "__new_macrotema__";
      let activePerfil = "todos";
      let selectedMacrotemaKey = null;
      let selectedTrilhaKey = null;
      let movingVideo = null;
      let draggingVideoId = null;

      function escapeHtml(value) {
        return String(value === null || value === undefined ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function requestJson(url, options) {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || `Falha na requisicao (${response.status})`);
        }

        return payload;
      }

      function macrotemaKey(trail) {
        return `${trail.perfil_da_jornada}␟${trail.macrotema}`;
      }

      function trilhaKey(trail) {
        return `${trail.perfil_da_jornada}␟${trail.macrotema}␟${trail.trilha}`;
      }

      function approvedCount(trail) {
        return trail.videos.filter((v) => v.status === true).length;
      }

      function macrotemasForActivePerfil() {
        const trails = state.trails.filter((t) => activePerfil === "todos" || t.perfil_da_jornada === activePerfil);
        const byKey = new Map();

        trails.forEach((t) => {
          const key = macrotemaKey(t);
          if (!byKey.has(key)) {
            byKey.set(key, {
              perfil_da_jornada: t.perfil_da_jornada,
              macrotema: t.macrotema,
              trails: [],
            });
          }
          byKey.get(key).trails.push(t);
        });

        return Array.from(byKey.values()).sort((left, right) => {
          if (left.perfil_da_jornada !== right.perfil_da_jornada) {
            return left.perfil_da_jornada.localeCompare(right.perfil_da_jornada);
          }
          return left.macrotema.localeCompare(right.macrotema);
        });
      }

      function renderPerfilTabs() {
        const perfis = Array.from(new Set(state.trails.map((t) => t.perfil_da_jornada))).sort();

        document.getElementById("perfilTabs").innerHTML = [
          `<button class="${activePerfil === "todos" ? "active" : ""}" data-perfil="todos">Todos</button>`,
          ...perfis.map(
            (p) => `<button class="${activePerfil === p ? "active" : ""}" data-perfil="${escapeHtml(p)}">${escapeHtml(p)}</button>`
          ),
        ].join("");
      }

      function renderMacrotemaGrid() {
        const macrotemas = macrotemasForActivePerfil();

        if (!macrotemas.length) {
          document.getElementById("macrotemaGrid").innerHTML =
            '<div class="empty-state"><strong>Nenhum macrotema encontrado</strong></div>';
          return;
        }

        document.getElementById("macrotemaGrid").innerHTML = macrotemas
          .map((m) => {
            const key = `${m.perfil_da_jornada}␟${m.macrotema}`;
            const videosCount = m.trails.reduce((sum, t) => sum + t.videos.length, 0);
            const approved = m.trails.reduce((sum, t) => sum + approvedCount(t), 0);

            return `
            <div class="card card-pad trail-card${key === selectedMacrotemaKey ? " selected" : ""}" data-macrotema="${escapeHtml(key)}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                <strong>${escapeHtml(m.macrotema)}</strong>
                <span class="badge badge-success">${approved}/${videosCount} aprovado(s)</span>
              </div>
              <p class="text-muted" style="margin-top:6px;font-size:12.5px;">Perfil: ${escapeHtml(m.perfil_da_jornada)}</p>
              <p class="text-faint" style="margin-top:10px;font-size:12.5px;">${m.trails.length} trilha(s) · ${videosCount} vídeo(s)</p>
            </div>`;
          })
          .join("");

        document.querySelectorAll("[data-macrotema]").forEach((card) => {
          card.addEventListener("click", () => {
            selectedMacrotemaKey = card.dataset.macrotema;
            const macrotema = macrotemas.find((m) => `${m.perfil_da_jornada}␟${m.macrotema}` === selectedMacrotemaKey);
            selectedTrilhaKey = macrotema && macrotema.trails.length ? trilhaKey(macrotema.trails[0]) : null;
            renderMacrotemaGrid();
            renderTrailDetail();
          });
        });
      }

      function currentMacrotema() {
        return macrotemasForActivePerfil().find((m) => `${m.perfil_da_jornada}␟${m.macrotema}` === selectedMacrotemaKey);
      }

      function allPerfis() {
        return Array.from(new Set(state.trails.map((t) => t.perfil_da_jornada))).sort();
      }

      function macrotemasForPerfil(perfil) {
        return Array.from(new Set(state.trails.filter((t) => t.perfil_da_jornada === perfil).map((t) => t.macrotema))).sort();
      }

      function trilhasForPerfilMacrotema(perfil, macrotema) {
        return Array.from(
          new Set(
            state.trails
              .filter((t) => t.perfil_da_jornada === perfil && t.macrotema === macrotema)
              .map((t) => t.trilha)
          )
        ).sort();
      }

      function renderTrailDetail() {
        const macrotema = currentMacrotema();
        const section = document.getElementById("trailDetailSection");

        if (!macrotema) {
          section.style.display = "none";
          return;
        }

        section.style.display = "flex";
        document.getElementById("macrotemaDetailTitle").textContent = macrotema.macrotema;
        const videosCount = macrotema.trails.reduce((sum, t) => sum + t.videos.length, 0);
        const approved = macrotema.trails.reduce((sum, t) => sum + approvedCount(t), 0);
        document.getElementById("trailDetailMeta").textContent = `${macrotema.trails.length} trilha(s) · ${approved} de ${videosCount} vídeo(s) aprovados`;

        document.getElementById("trilhaTabs").innerHTML = macrotema.trails
          .map((t) => {
            const key = trilhaKey(t);
            return `
            <button class="trilha-tab${key === selectedTrilhaKey ? " active" : ""}" data-trilha="${escapeHtml(key)}">
              ${escapeHtml(t.trilha)} <span class="count">(${t.videos.length})</span>
            </button>`;
          })
          .join("");

        document.querySelectorAll("[data-trilha]").forEach((btn) => {
          btn.addEventListener("click", () => {
            selectedTrilhaKey = btn.dataset.trilha;
            renderTrailDetail();
          });
        });

        const trail = macrotema.trails.find((t) => trilhaKey(t) === selectedTrilhaKey) || macrotema.trails[0];

        if (!trail) {
          document.getElementById("macrotemaPath").textContent = "";
          document.getElementById("videosBody").innerHTML = `<tr><td colspan="4"><div class="empty-state"><strong>Nenhuma trilha cadastrada</strong></div></td></tr>`;
          return;
        }

        document.getElementById("macrotemaPath").textContent = `${trail.perfil_da_jornada} · ${trail.macrotema} · ${trail.trilha}`;

        if (!trail.videos.length) {
          document.getElementById("videosBody").innerHTML = `
            <tr><td colspan="4">
              <div class="empty-state">
                <strong>Nenhum vídeo cadastrado nesta trilha</strong>
              </div>
            </td></tr>`;
          return;
        }

        const sortedVideos = [...trail.videos].sort((left, right) => (left.ordem ?? 0) - (right.ordem ?? 0));

        document.getElementById("videosBody").innerHTML = sortedVideos
          .map(
            (v, index) => `
            <tr class="video-row" draggable="true" data-video-id="${escapeHtml(v.id)}">
              <td><span class="drag-handle">⠿</span>${index + 1}</td>
              <td class="mono">${escapeHtml(v.nome_do_arquivo)}</td>
              <td>${v.status === true ? '<span class="badge badge-success">Aprovado</span>' : '<span class="badge badge-warning">Pendente</span>'}</td>
              <td style="display:flex;gap:6px;flex-wrap:wrap;">
                <button class="btn btn-secondary btn-sm" data-move="${escapeHtml(v.id)}">Mover de trilha</button>
                <button class="btn btn-ghost btn-sm" disabled title="Em breve">Revisar legenda</button>
              </td>
            </tr>`
          )
          .join("");

        document.querySelectorAll("[data-move]").forEach((btn) => btn.addEventListener("click", () => openMove(btn.dataset.move)));
        attachDragAndDrop(trail);
      }

      function attachDragAndDrop(trail) {
        const rows = document.querySelectorAll("#videosBody tr.video-row");

        rows.forEach((row) => {
          row.addEventListener("dragstart", () => {
            draggingVideoId = row.dataset.videoId;
            row.classList.add("dragging");
          });

          row.addEventListener("dragend", () => {
            row.classList.remove("dragging");
            document.querySelectorAll(".drag-over").forEach((el) => el.classList.remove("drag-over"));
          });

          row.addEventListener("dragover", (event) => {
            event.preventDefault();
            row.classList.add("drag-over");
          });

          row.addEventListener("dragleave", () => {
            row.classList.remove("drag-over");
          });

          row.addEventListener("drop", async (event) => {
            event.preventDefault();
            row.classList.remove("drag-over");

            const targetVideoId = row.dataset.videoId;
            if (!draggingVideoId || draggingVideoId === targetVideoId) return;

            const sortedVideos = [...trail.videos].sort((left, right) => (left.ordem ?? 0) - (right.ordem ?? 0));
            const orderedIds = sortedVideos.map((v) => v.id);
            const fromIndex = orderedIds.indexOf(draggingVideoId);
            const toIndex = orderedIds.indexOf(targetVideoId);
            if (fromIndex === -1 || toIndex === -1) return;

            orderedIds.splice(toIndex, 0, orderedIds.splice(fromIndex, 1)[0]);

            try {
              const updatedVideos = await requestJson("/video-catalog/reorder", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ordered_ids: orderedIds }),
              });

              updatedVideos.forEach((updated) => {
                const video = trail.videos.find((v) => v.id === updated.id);
                if (video) video.ordem = updated.ordem;
              });

              renderTrailDetail();
            } catch (error) {
              alert(error.message);
            }

            draggingVideoId = null;
          });
        });
      }

      document.getElementById("perfilTabs").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-perfil]");
        if (!btn) return;
        activePerfil = btn.dataset.perfil;
        selectedMacrotemaKey = null;
        selectedTrilhaKey = null;
        renderPerfilTabs();
        renderMacrotemaGrid();
        renderTrailDetail();
      });

      // Nova trilha
      const newTrailOverlay = document.getElementById("newTrailOverlay");

      function renderNewTrailPerfilSelect() {
        const select = document.getElementById("newTrailPerfil");
        select.innerHTML = allPerfis()
          .map((p) => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`)
          .join("");
      }

      function renderNewTrailMacrotemaSelect() {
        const perfil = document.getElementById("newTrailPerfil").value;
        const select = document.getElementById("newTrailMacrotema");
        const macrotemas = macrotemasForPerfil(perfil);

        select.innerHTML = [
          ...macrotemas.map((m) => `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`),
          `<option value="${NEW_MACROTEMA_OPTION}">+ Criar novo macrotema</option>`,
        ].join("");

        toggleNewMacrotemaField();
      }

      function toggleNewMacrotemaField() {
        const isNew = document.getElementById("newTrailMacrotema").value === NEW_MACROTEMA_OPTION;
        document.getElementById("newTrailMacrotemaNovoField").style.display = isNew ? "block" : "none";
      }

      function renderNewTrailVideosList() {
        const list = document.getElementById("newTrailVideosList");

        if (!state.unclassified.length) {
          list.innerHTML = '<div class="unclassified-item text-faint">Nenhum vídeo novo do Drive sem trilha definida.</div>';
          return;
        }

        list.innerHTML = state.unclassified
          .map(
            (v) => `
            <label class="unclassified-item">
              <input type="checkbox" value="${escapeHtml(v.id)}">
              <span class="mono">${escapeHtml(v.nome_do_arquivo)}</span>
            </label>`
          )
          .join("");
      }

      document.getElementById("newTrailButton").addEventListener("click", async () => {
        renderNewTrailPerfilSelect();
        renderNewTrailMacrotemaSelect();
        document.getElementById("newTrailMacrotemaNovo").value = "";
        document.getElementById("newTrailNome").value = "";
        document.getElementById("newTrailStatus").textContent = "";
        document.getElementById("newTrailStatus").className = "status-line";
        renderNewTrailVideosList();
        newTrailOverlay.hidden = false;

        try {
          state.unclassified = await requestJson("/video-catalog/unclassified");
        } catch (error) {
          state.unclassified = [];
        }

        renderNewTrailVideosList();
      });
      document.querySelectorAll("[data-close-new]").forEach((el) => el.addEventListener("click", () => (newTrailOverlay.hidden = true)));
      document.getElementById("newTrailPerfil").addEventListener("change", renderNewTrailMacrotemaSelect);
      document.getElementById("newTrailMacrotema").addEventListener("change", toggleNewMacrotemaField);

      document.getElementById("createTrailButton").addEventListener("click", async () => {
        const button = document.getElementById("createTrailButton");
        const status = document.getElementById("newTrailStatus");
        const perfil_da_jornada = document.getElementById("newTrailPerfil").value;
        const macrotemaSelect = document.getElementById("newTrailMacrotema").value;
        const macrotema =
          macrotemaSelect === NEW_MACROTEMA_OPTION
            ? document.getElementById("newTrailMacrotemaNovo").value.trim()
            : macrotemaSelect;
        const trilha = document.getElementById("newTrailNome").value.trim();
        const video_ids = Array.from(document.querySelectorAll("#newTrailVideosList input[type=checkbox]:checked")).map(
          (input) => input.value
        );

        if (!perfil_da_jornada || !macrotema || !trilha || !video_ids.length) {
          status.textContent = "Preencha perfil, macrotema, nome da trilha e selecione ao menos um vídeo.";
          status.className = "status-line error";
          return;
        }

        button.disabled = true;
        status.textContent = "Cadastrando trilha...";
        status.className = "status-line";

        try {
          await requestJson("/video-catalog/trails", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ perfil_da_jornada, macrotema, trilha, video_ids }),
          });

          newTrailOverlay.hidden = true;
          await initialize();
        } catch (error) {
          status.textContent = error.message;
          status.className = "status-line error";
        } finally {
          button.disabled = false;
        }
      });

      // Mover vídeo de trilha
      const moveOverlay = document.getElementById("moveOverlay");

      function renderMoveMacrotemaSelect(selectedMacrotema) {
        const perfil = document.getElementById("moveTargetPerfil").value;
        const select = document.getElementById("moveTargetMacrotema");
        const macrotemas = macrotemasForPerfil(perfil);

        select.innerHTML = macrotemas.map((m) => `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join("");

        if (selectedMacrotema && macrotemas.includes(selectedMacrotema)) {
          select.value = selectedMacrotema;
        }

        renderMoveTrilhaSelect();
      }

      function renderMoveTrilhaSelect(selectedTrilha) {
        const perfil = document.getElementById("moveTargetPerfil").value;
        const macrotema = document.getElementById("moveTargetMacrotema").value;
        const select = document.getElementById("moveTargetTrilha");
        const trilhas = trilhasForPerfilMacrotema(perfil, macrotema);

        select.innerHTML = trilhas.map((t) => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");

        if (selectedTrilha && trilhas.includes(selectedTrilha)) {
          select.value = selectedTrilha;
        }
      }

      function openMove(videoId) {
        const macrotema = currentMacrotema();
        const trail = macrotema ? macrotema.trails.find((t) => trilhaKey(t) === selectedTrilhaKey) : null;
        const video = trail ? trail.videos.find((v) => v.id === videoId) : null;
        if (!video) return;

        movingVideo = videoId;
        document.getElementById("moveVideoLabel").textContent = `Vídeo: ${video.nome_do_arquivo}`;

        const perfilSelect = document.getElementById("moveTargetPerfil");
        perfilSelect.innerHTML = allPerfis().map((p) => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");
        perfilSelect.value = trail.perfil_da_jornada;

        renderMoveMacrotemaSelect(trail.macrotema);
        renderMoveTrilhaSelect(trail.trilha);

        document.getElementById("moveStatus").textContent = "";
        document.getElementById("moveStatus").className = "status-line";
        moveOverlay.hidden = false;
      }
      document.querySelectorAll("[data-close-move]").forEach((el) => el.addEventListener("click", () => (moveOverlay.hidden = true)));
      document.getElementById("moveTargetPerfil").addEventListener("change", () => renderMoveMacrotemaSelect());
      document.getElementById("moveTargetMacrotema").addEventListener("change", () => renderMoveTrilhaSelect());

      document.getElementById("confirmMoveButton").addEventListener("click", async () => {
        const button = document.getElementById("confirmMoveButton");
        const status = document.getElementById("moveStatus");
        const perfil_da_jornada = document.getElementById("moveTargetPerfil").value;
        const macrotema = document.getElementById("moveTargetMacrotema").value;
        const trilha = document.getElementById("moveTargetTrilha").value;

        if (!perfil_da_jornada || !macrotema || !trilha) {
          status.textContent = "Preencha perfil, macrotema e trilha de destino.";
          status.className = "status-line error";
          return;
        }

        button.disabled = true;
        status.textContent = "Movendo vídeo...";
        status.className = "status-line";

        try {
          await requestJson(`/video-catalog/${encodeURIComponent(movingVideo)}/move-trail`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ perfil_da_jornada, macrotema, trilha }),
          });

          moveOverlay.hidden = true;
          await initialize();
        } catch (error) {
          status.textContent = error.message;
          status.className = "status-line error";
        } finally {
          button.disabled = false;
        }
      });

      function renderLoadError(error) {
        document.getElementById("macrotemaGrid").innerHTML = `
          <div class="empty-state"><strong>Falha ao carregar trilhas</strong><span>${escapeHtml(error.message)}</span></div>`;
      }

      async function initialize() {
        try {
          const trails = await requestJson("/video-catalog/trails-overview");
          state.trails = Array.isArray(trails) ? trails : [];

          if (!selectedMacrotemaKey) {
            const macrotemas = macrotemasForActivePerfil();
            selectedMacrotemaKey = macrotemas.length ? `${macrotemas[0].perfil_da_jornada}␟${macrotemas[0].macrotema}` : null;
            selectedTrilhaKey = macrotemas.length && macrotemas[0].trails.length ? trilhaKey(macrotemas[0].trails[0]) : null;
          }

          renderPerfilTabs();
          renderMacrotemaGrid();
          renderTrailDetail();
        } catch (error) {
          renderLoadError(error);
        }
      }

      initialize();
    </script>
  </body>
</html>
