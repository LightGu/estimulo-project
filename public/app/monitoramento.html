<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monitoramento de envios · Estímulo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
  </head>
  <body data-page="monitoramento">
    <div class="shell">
      <aside class="sidebar" id="sidebar-root"></aside>

      <div class="main">
        <header class="topbar">
          <div class="topbar-titles">
            <h1>Monitoramento de envios</h1>
            <p>Tentativas de envio registradas pelo sistema.</p>
          </div>
          <div class="topbar-actions">
            <div class="user-chip"><span class="avatar">GL</span> Gustavo Luz</div>
          </div>
        </header>

        <main class="page">
          <section class="page-section">
            <div class="grid grid-cols-3" id="statusSummary"></div>
          </section>

          <section class="page-section">
            <div class="toolbar">
              <div class="field" style="min-width:180px;">
                <label for="statusFilter">Status</label>
                <select id="statusFilter">
                  <option value="todos">Todos</option>
                  <option value="enviado">Enviado</option>
                  <option value="processando">Processando</option>
                  <option value="erro">Erro</option>
                </select>
              </div>
              <div class="field" style="min-width:200px;">
                <label for="groupFilter">Grupo</label>
                <input id="groupFilter" type="search" placeholder="Pesquisar por grupo...">
              </div>
              <div class="field" style="min-width:220px;">
                <label for="campaignFilter">Campanha</label>
                <select id="campaignFilter">
                  <option value="todas">Todas</option>
                </select>
              </div>
              <div class="field" style="min-width:160px;">
                <label for="dateFilter">Dia</label>
                <input id="dateFilter" type="date">
              </div>
              <div class="toolbar-spacer"></div>
              <button class="btn btn-secondary" id="clearFiltersButton" type="button">Limpar filtros</button>
            </div>
          </section>

          <section class="page-section">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Tentativa</th>
                    <th>Grupo</th>
                    <th>Campanha</th>
                    <th>Vídeo</th>
                    <th>Origem</th>
                    <th>Status</th>
                    <th>Data/hora</th>
                    <th>Erro</th>
                  </tr>
                </thead>
                <tbody id="logBody"></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/nav.js"></script>
    <script>
      const STATUS_BADGE = {
        enviado: "badge-success",
        processando: "badge-warning",
        erro: "badge-danger",
      };

      function populateCampaignFilter() {
        const names = Array.from(new Set(MOCK.dispatchLog.map((d) => d.campanha))).sort((a, b) => a.localeCompare(b, "pt-BR"));
        const select = document.getElementById("campaignFilter");
        select.innerHTML = '<option value="todas">Todas</option>' + names.map((n) => `<option value="${n}">${n}</option>`).join("");
      }

      function renderSummary(rows) {
        const counts = { enviado: 0, processando: 0, erro: 0 };
        rows.forEach((d) => counts[d.status]++);

        const cards = [
          { label: "Enviados", value: counts.enviado, bar: "var(--success)" },
          { label: "Processando", value: counts.processando, bar: "var(--warning)" },
          { label: "Erros", value: counts.erro, bar: "var(--danger)" },
        ];

        document.getElementById("statusSummary").innerHTML = cards
          .map(
            (c) => `
            <div class="card stat-card" style="--accent-bar:${c.bar}">
              <span class="stat-label">${c.label}</span>
              <span class="stat-value">${c.value}</span>
            </div>`
          )
          .join("");
      }

      function matchesFilters(entry) {
        const status = document.getElementById("statusFilter").value;
        const q = document.getElementById("groupFilter").value.trim().toLowerCase();
        const campanha = document.getElementById("campaignFilter").value;
        const date = document.getElementById("dateFilter").value;

        if (status !== "todos" && entry.status !== status) return false;
        if (q && !entry.grupo.toLowerCase().includes(q)) return false;
        if (campanha !== "todas" && entry.campanha !== campanha) return false;
        if (date && entry.tentativaEm.slice(0, 10) !== date) return false;
        return true;
      }

      function renderAll() {
        const rows = MOCK.dispatchLog.filter(matchesFilters);
        renderSummary(rows);

        if (!rows.length) {
          document.getElementById("logBody").innerHTML = `<tr><td colspan="8"><div class="empty-state"><strong>Nenhuma tentativa encontrada</strong></div></td></tr>`;
          return;
        }

        document.getElementById("logBody").innerHTML = rows
          .map(
            (d) => `
            <tr>
              <td class="mono">${d.id}</td>
              <td class="strong">${d.grupo}</td>
              <td>${d.campanha}</td>
              <td>${d.video}</td>
              <td>${d.origem}</td>
              <td><span class="badge ${STATUS_BADGE[d.status]}">${d.status}</span></td>
              <td class="mono">${d.tentativaEm}</td>
              <td>${d.erro ? `<span style="color:var(--danger);">${d.erro}</span>` : '<span class="text-faint">—</span>'}</td>
            </tr>`
          )
          .join("");
      }

      document.getElementById("statusFilter").addEventListener("change", renderAll);
      document.getElementById("groupFilter").addEventListener("input", renderAll);
      document.getElementById("campaignFilter").addEventListener("change", renderAll);
      document.getElementById("dateFilter").addEventListener("change", renderAll);
      document.getElementById("clearFiltersButton").addEventListener("click", () => {
        document.getElementById("statusFilter").value = "todos";
        document.getElementById("groupFilter").value = "";
        document.getElementById("campaignFilter").value = "todas";
        document.getElementById("dateFilter").value = "";
        renderAll();
      });

      populateCampaignFilter();
      renderAll();
    </script>
  </body>
</html>
