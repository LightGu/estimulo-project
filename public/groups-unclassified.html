<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grupos nao classificados</title>
    <link rel="icon" href="app/assets/img/logo-mark.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="app/assets/img/logo-mark.svg">
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-strong: #eef2f6;
        --text: #18202a;
        --muted: #617082;
        --line: #d9e0e8;
        --primary: #176b87;
        --primary-dark: #0f5269;
        --danger: #a33a3a;
        --success: #237a57;
        --secondary: #334155;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        background: var(--primary);
        color: #ffffff;
        cursor: pointer;
        font-weight: 700;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button.secondary {
        background: var(--secondary);
      }

      button.secondary:hover {
        background: #1f2937;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(180px, 260px) auto auto;
        gap: 12px;
        align-items: end;
        margin: 0 0 16px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      label {
        display: grid;
        gap: 6px;
        color: #334155;
        font-size: 13px;
        font-weight: 700;
      }

      select,
      input[type="search"],
      input[type="text"] {
        width: 100%;
        min-width: 170px;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--text);
        background: #ffffff;
        font: inherit;
      }

      .status {
        min-height: 22px;
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 920px;
      }

      th,
      td {
        padding: 14px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
      }

      th {
        background: var(--surface-strong);
        color: #334155;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .group-name {
        min-width: 220px;
        font-weight: 700;
      }

      .group-id {
        width: 230px;
        color: var(--muted);
        font-family: Consolas, "Courier New", monospace;
        font-size: 13px;
        word-break: break-word;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--primary);
      }

      .checkbox-cell {
        width: 120px;
        text-align: center;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .video-preview {
        min-width: 220px;
        color: var(--muted);
        font-size: 13px;
      }

      .row-status {
        min-width: 150px;
        color: var(--muted);
        font-size: 13px;
      }

      .row-status.error {
        color: var(--danger);
      }

      .row-status.success {
        color: var(--success);
      }

      .empty {
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted);
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 1180px);
          padding: 20px 0;
        }

        header {
          align-items: stretch;
          flex-direction: column;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Grupos nao classificados</h1>
          <p>Classifique os grupos sincronizados pela Evolution API.</p>
        </div>
        <button type="button" id="reloadButton">Atualizar</button>
      </header>

      <section class="toolbar" aria-label="Sincronizacao de grupos">
        <label>
          Filtro de nome
          <input id="nameFilterInput" type="search" value="Teste" placeholder="Ex.: Teste">
        </label>
        <button type="button" id="syncButton">Sincronizar filtro</button>
        <button type="button" id="syncAllButton" class="secondary">Sincronizar todos</button>
      </section>

      <div id="status" class="status" role="status"></div>
      <section id="content"></section>
    </main>

    <datalist id="segmentOptions">
      <option value="Pre infancia"></option>
      <option value="Infancia"></option>
      <option value="Adolescencia"></option>
      <option value="Pré-infância"></option>
      <option value="Infância"></option>
      <option value="Adolescência"></option>
      <option value="Adolescência/Maturidade"></option>
      <option value="Empreendedores na pre infancia"></option>
    </datalist>

    <script>
      const content = document.querySelector("#content");
      const statusEl = document.querySelector("#status");
      const reloadButton = document.querySelector("#reloadButton");
      const nameFilterInput = document.querySelector("#nameFilterInput");
      const syncButton = document.querySelector("#syncButton");
      const syncAllButton = document.querySelector("#syncAllButton");
      let organizationsCache = [];

      function setStatus(message, type) {
        statusEl.textContent = message || "";
        statusEl.className = type ? `status ${type}` : "status";
      }

      function textOrEmpty(value) {
        return value === null || value === undefined ? "" : String(value);
      }

      function buildPayload(row) {
        const organizationId = row.querySelector("[data-field='organization_id']").value;
        const segmento = row.querySelector("[data-field='segmento']").value.trim();
        const trilhaOverride = row.querySelector("[data-field='trilha_override']").value.trim();
        const enviaVideo = row.querySelector("[data-field='envia_video']").checked;

        return {
          organization_id: organizationId || null,
          segmento: segmento || null,
          envia_video: enviaVideo,
          trilha_override: trilhaOverride || null,
        };
      }

      function setRowStatus(row, message, type) {
        const rowStatus = row.querySelector("[data-row-status]");
        rowStatus.textContent = message || "";
        rowStatus.className = type ? `row-status ${type}` : "row-status";
      }

      async function saveGroup(row, groupId) {
        const button = row.querySelector("[data-action='save']");
        button.disabled = true;
        setRowStatus(row, "Salvando...");

        try {
          const response = await fetch(`/groups/${encodeURIComponent(groupId)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(buildPayload(row)),
          });

          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(payload.error || "Falha ao salvar grupo");
          }

          setRowStatus(row, "Salvo", "success");
        } catch (error) {
          setRowStatus(row, error.message, "error");
        } finally {
          button.disabled = false;
        }
      }

      function renderEmpty() {
        content.innerHTML = '<div class="empty">Nenhum grupo pendente de classificacao.</div>';
      }

      function renderGroups(groups) {
        if (!groups.length) {
          renderEmpty();
          return;
        }

        content.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome real</th>
                  <th>Evolution group id</th>
                  <th>Organizacao</th>
                  <th>Segmento</th>
                  <th>Envia video</th>
                  <th>Trilha</th>
                  <th>Primeiro video</th>
                  <th>Acao</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        `;

        const tbody = content.querySelector("tbody");

        groups.forEach((group) => {
          const row = document.createElement("tr");
          row.dataset.groupId = group.id;
          row.innerHTML = `
            <td class="group-name"></td>
            <td class="group-id"></td>
            <td>
              <select data-field="organization_id"></select>
            </td>
            <td>
              <input data-field="segmento" type="text" list="segmentOptions" autocomplete="off" placeholder="Selecionar ou informar">
            </td>
            <td class="checkbox-cell">
              <input data-field="envia_video" type="checkbox" aria-label="Envia video">
            </td>
            <td>
              <select data-field="trilha_override">
                <option value="">Selecione o perfil</option>
              </select>
            </td>
            <td data-video-preview class="video-preview"></td>
            <td>
              <div class="actions">
                <button type="button" data-action="save">Salvar</button>
                <button type="button" data-action="transcribe" class="secondary">Transcrever</button>
                <button type="button" data-action="dispatch" class="secondary">Enfileirar</button>
              </div>
            </td>
            <td data-row-status class="row-status"></td>
          `;

          row.querySelector(".group-name").textContent = textOrEmpty(group.nome);
          row.querySelector(".group-id").textContent = textOrEmpty(group.evolution_group_id);
          const organizationField = row.querySelector("[data-field='organization_id']");
          organizationField.innerHTML = '<option value="">Selecionar</option>';
          organizationsCache.forEach((organization) => {
            const option = document.createElement("option");
            option.value = organization.id;
            option.textContent = organization.nome;
            organizationField.appendChild(option);
          });
          organizationField.value = textOrEmpty(group.organization_id);
          const segmentField = row.querySelector("[data-field='segmento']");
          const trailField = row.querySelector("[data-field='trilha_override']");
          segmentField.value = textOrEmpty(group.segmento);
          row.querySelector("[data-field='envia_video']").checked = group.envia_video === true;
          segmentField.addEventListener("change", () => loadTrailsForRow(row));
          segmentField.addEventListener("blur", () => loadTrailsForRow(row));
          trailField.addEventListener("change", () => updateVideoPreview(row));
          row.querySelector("[data-action='save']").addEventListener("click", () => saveGroup(row, group.id));
          row.querySelector("[data-action='transcribe']").addEventListener("click", () => transcribeSelectedVideo(row));
          row.querySelector("[data-action='dispatch']").addEventListener("click", () => dispatchGroup(row, group.id));

          tbody.appendChild(row);
          loadTrailsForRow(row, textOrEmpty(group.trilha_override));
        });
      }

      async function loadTrailsForRow(row, selectedTrail) {
        const segment = row.querySelector("[data-field='segmento']").value.trim();
        const trailField = row.querySelector("[data-field='trilha_override']");
        const preview = row.querySelector("[data-video-preview]");

        trailField.innerHTML = '<option value="">Selecione o perfil</option>';
        preview.textContent = "";

        if (!segment) {
          return;
        }

        trailField.innerHTML = '<option value="">Carregando...</option>';

        try {
          const response = await fetch(`/video-catalog/trails?perfil=${encodeURIComponent(segment)}`);
          const trails = await response.json();

          if (!response.ok) {
            throw new Error(trails.error || "Falha ao carregar trilhas");
          }

          trailField.innerHTML = '<option value="">Selecione</option>';

          (Array.isArray(trails) ? trails : []).forEach((trail) => {
            const option = document.createElement("option");
            option.value = trail.trilha;
            option.textContent = `${trail.trilha} (${trail.videos_count})`;
            option.dataset.video = JSON.stringify(trail.first_video || {});
            trailField.appendChild(option);
          });

          if (selectedTrail) {
            trailField.value = selectedTrail;
          }

          updateVideoPreview(row);
        } catch (error) {
          trailField.innerHTML = '<option value="">Erro ao carregar</option>';
          preview.textContent = error.message;
        }
      }

      function updateVideoPreview(row) {
        row.dataset.selectedVideoId = "";
        const trailField = row.querySelector("[data-field='trilha_override']");
        const preview = row.querySelector("[data-video-preview]");
        const selectedOption = trailField.selectedOptions[0];
        const video = selectedOption && selectedOption.dataset.video ? JSON.parse(selectedOption.dataset.video) : null;

        if (!video || !video.id) {
          preview.textContent = "";
          return;
        }

        row.dataset.selectedVideoId = video.id;
        preview.textContent = `${video.ordem_geral || video.ordem || 1} - ${video.nome_do_arquivo || video.trilha || video.id}`;
      }

      async function transcribeSelectedVideo(row) {
        const button = row.querySelector("[data-action='transcribe']");
        const videoId = row.dataset.selectedVideoId;

        if (!videoId) {
          setRowStatus(row, "Selecione uma trilha com video", "error");
          return;
        }

        button.disabled = true;
        setRowStatus(row, "Transcrevendo video selecionado...");

        try {
          const response = await fetch(`/video-catalog/${encodeURIComponent(videoId)}/transcript`, {
            method: "POST",
          });
          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(payload.error || "Falha ao transcrever video");
          }

          setRowStatus(
            row,
            payload.skipped ? "Transcricao ja existia" : "Transcricao gerada",
            "success"
          );
        } catch (error) {
          setRowStatus(row, error.message, "error");
        } finally {
          button.disabled = false;
        }
      }

      function padTimePart(value) {
        return String(value).padStart(2, "0");
      }

      function formatLocalDate(date) {
        return `${date.getFullYear()}-${padTimePart(date.getMonth() + 1)}-${padTimePart(date.getDate())}`;
      }

      function formatLocalTime(date) {
        return `${padTimePart(date.getHours())}:${padTimePart(date.getMinutes())}:${padTimePart(date.getSeconds())}`;
      }

      async function dispatchGroup(row, groupId) {
        const button = row.querySelector("[data-action='dispatch']");
        button.disabled = true;
        setRowStatus(row, "Criando campanha e enfileirando...");

        try {
          const groupPayload = buildPayload(row);

          if (!groupPayload.organization_id) {
            throw new Error("Organizacao e obrigatoria");
          }

          if (!groupPayload.trilha_override) {
            throw new Error("Trilha e obrigatoria");
          }

          const updateResponse = await fetch(`/groups/${encodeURIComponent(groupId)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(groupPayload),
          });
          const updatePayload = await updateResponse.json().catch(() => ({}));

          if (!updateResponse.ok) {
            throw new Error(updatePayload.error || "Falha ao salvar grupo");
          }

          const now = new Date();
          const response = await fetch("/campaigns", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              nome: groupPayload.trilha_override,
              organization_id: groupPayload.organization_id,
              group_ids: [groupId],
              ativo: true,
              execution_at: now.toISOString(),
              data_envio: formatLocalDate(now),
              horario_envio: formatLocalTime(now),
            }),
          });
          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(payload.error || "Falha ao criar campanha");
          }

          setRowStatus(
            row,
            `Campanha ${payload.campaign && payload.campaign.id} enfileirada no job ${payload.trigger_job && payload.trigger_job.id}`,
            "success"
          );
        } catch (error) {
          setRowStatus(row, error.message, "error");
        } finally {
          button.disabled = false;
        }
      }

      async function loadGroups() {
        reloadButton.disabled = true;
        setStatus("Carregando grupos...");

        try {
          const filter = nameFilterInput.value.trim();
          const query = filter ? `?name_contains=${encodeURIComponent(filter)}` : "";
          const response = await fetch(`/groups/search${query}`);
          const groups = await response.json();

          if (!response.ok) {
            throw new Error(groups.error || "Falha ao carregar grupos");
          }

          renderGroups(Array.isArray(groups) ? groups : []);
          setStatus(`${Array.isArray(groups) ? groups.length : 0} grupo(s) pendente(s) exibido(s).`, "success");
        } catch (error) {
          content.innerHTML = "";
          setStatus(error.message, "error");
        } finally {
          reloadButton.disabled = false;
        }
      }

      async function loadOrganizations() {
        try {
          const response = await fetch("/organizations");
          const organizations = await response.json();

          if (!response.ok) {
            throw new Error(organizations.error || "Falha ao carregar organizacoes");
          }

          organizationsCache = Array.isArray(organizations) ? organizations : [];
        } catch (error) {
          organizationsCache = [];
          setStatus(error.message, "error");
        }
      }

      async function syncGroups(options = {}) {
        const nameContains = options.all ? "" : nameFilterInput.value.trim();

        syncButton.disabled = true;
        syncAllButton.disabled = true;
        setStatus("Sincronizando grupos da Evolution...");

        try {
          const response = await fetch("/groups/sync", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name_contains: nameContains,
              get_participants: false,
              timeout_ms: 180000,
            }),
          });
          const result = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(result.error || "Falha ao sincronizar grupos");
          }

          await loadGroups();
          setStatus(
            `Sync concluido: ${result.inserted || 0} inserido(s), ${result.updated || 0} atualizado(s), ${result.ignored || 0} ignorado(s).`,
            "success"
          );
        } catch (error) {
          setStatus(error.message, "error");
        } finally {
          syncButton.disabled = false;
          syncAllButton.disabled = false;
        }
      }

      reloadButton.addEventListener("click", loadGroups);
      nameFilterInput.addEventListener("input", loadGroups);
      syncButton.addEventListener("click", () => syncGroups());
      syncAllButton.addEventListener("click", () => syncGroups({ all: true }));
      loadOrganizations().finally(loadGroups);
    </script>
  </body>
</html>
