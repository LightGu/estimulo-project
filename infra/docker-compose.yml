services:
  redis:
    image: redis:7.4-alpine
    container_name: estimulo-redis
    restart: unless-stopped
    command: sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    env_file:
      - ../.env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-local}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-postgres:
    image: postgres:16-alpine
    container_name: estimulo-evolution-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER:-evolution}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-evolution-local}
      POSTGRES_DB: ${EVOLUTION_DB_NAME:-evolution}
    ports:
      - "${EVOLUTION_DB_PORT:-5433}:5432"
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: ${EVOLUTION_API_IMAGE:-evoapicloud/evolution-api:latest}
    container_name: estimulo-evolution-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      evolution-postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_API_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DEL_INSTANCE: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${EVOLUTION_DB_USER:-evolution}:${EVOLUTION_DB_PASSWORD:-evolution-local}@evolution-postgres:5432/${EVOLUTION_DB_NAME:-evolution}?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_mvp
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://default:${REDIS_PASSWORD:-redis-local}@redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      WEBSOCKET_ENABLED: "true"
      WEBSOCKET_GLOBAL_EVENTS: "true"
      WEBHOOK_GLOBAL_ENABLED: "false"
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: ERROR,WARN,INFO,LOG
      LOG_COLOR: "true"
      LOG_BAILEYS: error
      LANGUAGE: pt-BR
    ports:
      - "${EVOLUTION_API_PORT:-8080}:8080"
    volumes:
      - evolution-instances:/evolution/instances

volumes:
  redis-data:
  evolution-postgres-data:
  evolution-instances:
